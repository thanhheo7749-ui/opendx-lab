name: CI Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'dashboard/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'dashboard/**'

jobs:
  dashboard-ci:
    name: Dashboard Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check if dashboard exists
        id: check
        run: |
          if [ -f "dashboard/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭ Dashboard code not found, skipping CI"
          fi

      - name: Set up Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm install
        working-directory: dashboard

      - name: Generate Prisma Client
        if: steps.check.outputs.exists == 'true'
        run: npx prisma generate
        working-directory: dashboard

      - name: Run Linter
        if: steps.check.outputs.exists == 'true'
        run: npm run lint
        working-directory: dashboard

      - name: Test Build
        if: steps.check.outputs.exists == 'true'
        run: npm run build
        working-directory: dashboard
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci_fallback_secret_only_for_testing_123
          AUTH_TRUST_HOST: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opendx
          KEYCLOAK_CLIENT_ID: opendx-dashboard
          KEYCLOAK_CLIENT_SECRET: change-me
          KEYCLOAK_ISSUER: http://localhost:8080/realms/opendx
