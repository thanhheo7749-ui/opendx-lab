name: "💡 Feature Request"
description: "Suggest a new feature or enhancement for OpenDX-Lab"
title: "[Feat]: "
labels: ["enhancement", "feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill in the details below to describe your idea as clearly as possible.

  - type: textarea
    id: problem
    attributes:
      label: "Problem Statement"
      description: "Is this feature request related to a problem? Describe the pain point."
      placeholder: "Describe the problem or inconvenience you're experiencing with the current system..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the feature or solution you'd like to see implemented."
      placeholder: "Describe how the feature would work, what the UI might look like, etc."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Have you considered any alternative solutions or workarounds?"
      placeholder: "List any alternative approaches or manual workarounds you've considered..."

  - type: checkboxes
    id: components
    attributes:
      label: "Affected Components"
      description: "Select the H-P-D-I spaces or services affected by this request:"
      options:
        - label: "[H] Human (Keycloak, Rocket.Chat, Wiki.js)"
        - label: "[P] Process (n8n, Next.js Dashboard)"
        - label: "[D] Data (PostgreSQL, Metabase)"
        - label: "[I] Intelligence (Ollama, AI Chat)"
        - label: "Infrastructure / Docker Compose"
        - label: "Documentation"
